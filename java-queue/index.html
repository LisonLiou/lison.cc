/span><br><span class="line">	public Node(E data, Node&lt;E&gt; next) &#123;</span><br><span class="line">		this.data &#x3D; data;</span><br><span class="line">		this.next &#x3D; next;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line">&#x2F;**</span><br><span class="line"> * 链表队列实现</span><br><span class="line"> * @author Lison-Liou</span><br><span class="line"> *</span><br><span class="line"> * @param &lt;E&gt;</span><br><span class="line"> *&#x2F;</span><br><span class="line">public class MyQueue&lt;E&gt; &#123;</span><br><span class="line"></span><br><span class="line">	int size;</span><br><span class="line">	Node&lt;E&gt; front, rear;</span><br><span class="line"></span><br><span class="line">	public void initQueue() &#123;</span><br><span class="line">		front &#x3D; rear &#x3D; null;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	public boolean isEmpty() &#123;</span><br><span class="line">		return size &#x3D;&#x3D; 0;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	public void enQueue(int data) &#123;</span><br><span class="line"></span><br><span class="line">		if (isEmpty()) &#123;</span><br><span class="line">			front &#x3D; new Node(data);</span><br><span class="line">			rear &#x3D; front;</span><br><span class="line">		&#125; else &#123;</span><br><span class="line">			Node newRear &#x3D; new Node(data);</span><br><span class="line">			rear.next &#x3D; newRear;</span><br><span class="line">			rear &#x3D; newRear;</span><br><span class="line">		&#125;</span><br><span class="line"></span><br><span class="line">		size++;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	public E deQueue() &#123;</span><br><span class="line"></span><br><span class="line">		if (!isEmpty()) &#123;</span><br><span class="line"></span><br><span class="line">			Node&lt;E&gt; f0 &#x3D; front;</span><br><span class="line">			Node&lt;E&gt; f &#x3D; f0.next;</span><br><span class="line">			front &#x3D; f;</span><br><span class="line"></span><br><span class="line">			size--;</span><br><span class="line">			return f0.data;</span><br><span class="line">		&#125;</span><br><span class="line">		return null;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	public E frontQueue() &#123;</span><br><span class="line">		return front.data;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	public void clear() &#123;</span><br><span class="line">		while (!isEmpty()) &#123;</span><br><span class="line">			deQueue();</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line">&#x2F;&#x2F;&#x2F;&#x2F; 链表队列测试代码&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;</span><br><span class="line"></span><br><span class="line">		MyQueue&lt;Integer&gt; queue &#x3D; new MyQueue&lt;Integer&gt;();</span><br><span class="line">		queue.initQueue();</span><br><span class="line"></span><br><span class="line">		System.out.println(&quot;入队列操作--------------------------&quot;);</span><br><span class="line">		for (int i &#x3D; 0; i &lt; 7; i++) &#123;</span><br><span class="line">			int d &#x3D; random.nextInt(i + 1);</span><br><span class="line">			System.out.print(d + &quot;\t&quot;);</span><br><span class="line">			queue.enQueue(d);</span><br><span class="line">		&#125;</span><br><span class="line"></span><br><span class="line">&#x2F;&#x2F;		System.out.println(&quot;\r\n出队列操作--------------------------&quot;);</span><br><span class="line">&#x2F;&#x2F;		while (!queue.isEmpty()) &#123;</span><br><span class="line">&#x2F;&#x2F;			System.err.print(queue.deQueue() + &quot;\t&quot;);</span><br><span class="line">&#x2F;&#x2F;		&#125;</span><br><span class="line">		</span><br><span class="line">		System.out.println(&quot;\r\n清空队列操作--------------------------&quot;);</span><br><span class="line">		queue.clear();</span><br><span class="line"></span><br><span class="line">		System.out.println(&quot;\r\nQUEUE SIZE: &quot; + queue.size);</span><br></pre></td></tr></table></figure>
