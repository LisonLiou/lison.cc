    <h1 id="post-title">.NET序列化反序列化对象并写入JSON文件（读取JSON并反射其属性与值）</h1>

    <div id="post-content" class="markdown-body">
        <a id="more"></a>

<p>不使用NEWTONSOFT的JSON库，使用.net framework 4.6，序列化对象并存入JSON文件；然后读取JSON文件内容并反序列化对象；使用反射方法读取其所有属性与属性值，直接上代码：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br></pre></td><td class="code"><pre><span class="line">using System;</span><br><span class="line">using System.IO;</span><br><span class="line">using System.Text;</span><br><span class="line">using System.Runtime.Serialization;</span><br><span class="line">using System.Runtime.Serialization.Json;</span><br><span class="line">using System.Reflection;</span><br><span class="line"></span><br><span class="line">namespace ConsoleApp1</span><br><span class="line">&#123;</span><br><span class="line">    [DataContract]</span><br><span class="line">    class MyConfig</span><br><span class="line">    &#123;</span><br><span class="line">        [DataMember]</span><br><span class="line">        public string IP</span><br><span class="line">        &#123;</span><br><span class="line">            get; set;</span><br><span class="line">        &#125;</span><br><span class="line">        [DataMember]</span><br><span class="line">        public int Port</span><br><span class="line">        &#123;</span><br><span class="line">            get; set;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    class Program</span><br><span class="line">    &#123;</span><br><span class="line">        const string CONFIG_JSON &#x3D; &quot;.config&quot;;</span><br><span class="line"></span><br><span class="line">        static void Main(string[] args)</span><br><span class="line">        &#123;</span><br><span class="line"></span><br><span class="line">            MyConfig config &#x3D; new MyConfig();</span><br><span class="line"></span><br><span class="line">            Console.WriteLine(&quot;IP:&quot;);</span><br><span class="line">            config.IP &#x3D; Console.ReadLine();</span><br><span class="line">            Console.WriteLine(&quot;Port:&quot;);</span><br><span class="line">            config.Port &#x3D; int.Parse(Console.ReadLine());</span><br><span class="line"></span><br><span class="line">            string json &#x3D; JSONSerializer&lt;MyConfig&gt;.Serialize(config);</span><br><span class="line">            File.WriteAllText(CONFIG_JSON, json);</span><br><span class="line">            Console.WriteLine(&quot;写入JSON文件.config\r\n开始读取文件内容&quot;);</span><br><span class="line"></span><br><span class="line">            json &#x3D; File.ReadAllText(CONFIG_JSON);</span><br><span class="line">            Console.WriteLine(&quot;读取JSON文件.config\r\n&quot; + json);</span><br><span class="line">            config &#x3D; JSONSerializer&lt;MyConfig&gt;.DeSerialize(json);</span><br><span class="line"></span><br><span class="line">            Type t &#x3D; config.GetType();</span><br><span class="line">            PropertyInfo[] pArray &#x3D; t.GetProperties();</span><br><span class="line">            for (int i &#x3D; 0; i &lt; pArray.Length; i++)</span><br><span class="line">            &#123;</span><br><span class="line">                Console.WriteLine(&quot;属性&quot; + i + &quot;: &quot; + pArray[i].Name + &quot; &quot; + pArray[i].GetValue(config));</span><br><span class="line">            &#125;</span><br><span class="line"></span><br><span class="line">            Console.Read();</span><br><span class="line"></span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    public static class JSONSerializer&lt;TType&gt; where TType : class</span><br><span class="line">    &#123;</span><br><span class="line">        &#x2F;&#x2F;&#x2F; &lt;summary&gt;</span><br><span class="line">        &#x2F;&#x2F;&#x2F; Serializes an object to JSON</span><br><span class="line">        &#x2F;&#x2F;&#x2F; &lt;&#x2F;summary&gt;</span><br><span class="line">        public static string Serialize(TType instance)</span><br><span class="line">        &#123;</span><br><span class="line">            var serializer &#x3D; new DataContractJsonSerializer(typeof(TType));</span><br><span class="line">            using (var stream &#x3D; new MemoryStream())</span><br><span class="line">            &#123;</span><br><span class="line">                serializer.WriteObject(stream, instance);</span><br><span class="line">                return Encoding.Default.GetString(stream.ToArray());</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        &#x2F;&#x2F;&#x2F; &lt;summary&gt;</span><br><span class="line">        &#x2F;&#x2F;&#x2F; DeSerializes an object from JSON</span><br><span class="line">        &#x2F;&#x2F;&#x2F; &lt;&#x2F;summary&gt;</span><br><span class="line">        public static TType DeSerialize(string json)</span><br><span class="line">        &#123;</span><br><span class="line">            using (var stream &#x3D; new MemoryStream(Encoding.Default.GetBytes(json)))</span><br><span class="line">            &#123;</span><br><span class="line">                var serializer &#x3D; new DataContractJsonSerializer(typeof(TType));</span><br><span class="line">                return serializer.ReadObject(stream) as TType;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>

<p>执行后会在当前路径生成.config文件。</p>
