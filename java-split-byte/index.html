    <div id="post-content" class="markdown-body">
        <p>java byte[] split</p>
<p>简单的字节数组分割方法，输入要拆分的数组及要按几个拆成一份即可，返回二维数组byte[]，做记录直接上代码了。</p>
<a id="more"></a>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br></pre></td><td class="code"><pre><span class="line">&#x2F;**</span><br><span class="line">	 * 拆分byte数组</span><br><span class="line">	 * </span><br><span class="line">	 * @param bytes</span><br><span class="line">	 *            要拆分的数组</span><br><span class="line">	 * @param copies</span><br><span class="line">	 *            要按几个组成一份</span><br><span class="line">	 * @return</span><br><span class="line">	 *&#x2F;</span><br><span class="line">	static byte[][] split_bytes(byte[] bytes, int copies) &#123;</span><br><span class="line"></span><br><span class="line">		double split_length &#x3D; Double.parseDouble(copies + &quot;&quot;);</span><br><span class="line"></span><br><span class="line">		int array_length &#x3D; (int) Math.ceil(bytes.length &#x2F; split_length);</span><br><span class="line">		byte[][] result &#x3D; new byte[array_length][];</span><br><span class="line"></span><br><span class="line">		int from, to;</span><br><span class="line"></span><br><span class="line">		for (int i &#x3D; 0; i &lt; array_length; i++) &#123;</span><br><span class="line"></span><br><span class="line">			from &#x3D; (int) (i * split_length);</span><br><span class="line">			to &#x3D; (int) (from + split_length);</span><br><span class="line"></span><br><span class="line">			if (to &gt; bytes.length)</span><br><span class="line">				to &#x3D; bytes.length;</span><br><span class="line"></span><br><span class="line">			result[i] &#x3D; Arrays.copyOfRange(bytes, from, to);</span><br><span class="line">		&#125;</span><br><span class="line"></span><br><span class="line">		return result;</span><br><span class="line">	&#125;</span><br></pre></td></tr></table></figure>

<p>测试代码：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><span class="line">byte[] sum &#x3D; &#123; 23, 4, 23, 42, 34, 2, 34, 2, 34, 2, 54, 3, 4, 56, 4, 7, 56, 7, 8, 5, 15, 2, 34, 2, 41, 2, 32, 3,</span><br><span class="line">				3, 3, 33 &#125;;</span><br><span class="line">		</span><br><span class="line">		&#x2F;&#x2F;按四个分成一组</span><br><span class="line">		byte[][] bytes &#x3D; split_bytes(sum, 4);</span><br><span class="line"></span><br><span class="line">		System.out.println(bytes.length);</span><br><span class="line"></span><br><span class="line">		System.out.print(&quot;\r\n\r\n&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;&#x3D;\r\n&quot;);</span><br><span class="line"></span><br><span class="line">		for (int i &#x3D; 0; i &lt; bytes.length; i++) &#123;</span><br><span class="line">			for (int j &#x3D; 0; j &lt; bytes[i].length; j++) &#123;</span><br><span class="line">				System.out.print(bytes[i][j] + &quot; &quot;);</span><br><span class="line">			&#125;</span><br><span class="line"></span><br><span class="line">			System.out.println(&quot;&quot;);</span><br><span class="line">		&#125;</span><br></pre></td></tr></table></figure>
