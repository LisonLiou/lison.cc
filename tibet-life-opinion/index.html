    <h1 id="post-title">證悟、佛心與凡夫心 讀記《西藏生死書》</h1>
    <time id="post-date" datetime="2018-09-25T07:32:19.000Z">
        September 25, 2018
    </time>
    <div id="post-content" class="markdown-body">
        <p>我們雖然也想佛陀一般具有佛性，卻未認出來，因爲它被我們的凡夫心包得密不透風。試著觀想這裏有一隻花瓶，瓶内的空間與瓶外的空間一模一樣，卻被脆弱的瓶壁分隔。我們的佛心被包在凡夫心的瓶壁内。儅我們證悟時，就好像花瓶破成碎片，“裏面”的空間與“外面”的空間結合爲一。它們合而爲一。當下我們才發現，它們從未分離也并無二緻，他們是永遠相同的。</p>
