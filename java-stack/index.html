    <h1 id="post-title">学习基于链表的栈Stack实现java版</h1>
    <time id="post-date" datetime="2018-12-23T09:16:55.000Z">
        December 23, 2018
    </time>
    <div id="post-content" class="markdown-body">
        <p>“栈” 遵循先进后出的原则，基本操作有：初始化栈，判断栈空，入栈出栈，读取栈顶元素，代码实现如下</p>
<a id="more"></a>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br></pre></td><td class="code"><pre><span class="line">&#x2F;**</span><br><span class="line"> * 单个节点</span><br><span class="line"> * </span><br><span class="line"> * @author Lison-Liou</span><br><span class="line"> *</span><br><span class="line"> *&#x2F;</span><br><span class="line">public class Node &#123;</span><br><span class="line">	int data &#x3D; 0;</span><br><span class="line">	Node next;</span><br><span class="line"></span><br><span class="line">	public Node() &#123;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	public Node(int data) &#123;</span><br><span class="line">		this.data &#x3D; data;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	public Node(int data, Node next) &#123;</span><br><span class="line">		this.data &#x3D; data;</span><br><span class="line">		this.next &#x3D; next;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br><span class="line">&#x2F;**</span><br><span class="line"> * 后进先出 LIFO LAST IN FIRST OUT</span><br><span class="line"> * </span><br><span class="line"> * @author Lison-Liou</span><br><span class="line"> *</span><br><span class="line"> *&#x2F;</span><br><span class="line">public class MyStack &#123;</span><br><span class="line"></span><br><span class="line">	Node top;</span><br><span class="line">	int size;</span><br><span class="line"></span><br><span class="line">	public void initStack() &#123;</span><br><span class="line">		top &#x3D; null;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	public boolean isEmpty() &#123;</span><br><span class="line">		return size &#x3D;&#x3D; 0;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	public void push(int x) &#123;</span><br><span class="line">		top &#x3D; new Node(x, top);</span><br><span class="line">		size++;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	public int pop() &#123;</span><br><span class="line"></span><br><span class="line">		Node t &#x3D; top;</span><br><span class="line">		top &#x3D; top.next;</span><br><span class="line">		size--;</span><br><span class="line">		return t.data;</span><br><span class="line">	&#125;</span><br><span class="line"></span><br><span class="line">	public int top() &#123;</span><br><span class="line">		return top.data;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<p>测试代码</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line">MyStack stack &#x3D; new MyStack();</span><br><span class="line">		stack.initStack();</span><br><span class="line"></span><br><span class="line">		System.out.println(&quot;入栈操作--------------------------&quot;);</span><br><span class="line">		for (int i &#x3D; 0; i &lt; 6; i++) &#123;</span><br><span class="line">			int d &#x3D; random.nextInt(10);</span><br><span class="line">			System.out.print(d + &quot;\t&quot;);</span><br><span class="line"></span><br><span class="line">			stack.push(d);</span><br><span class="line">		&#125;</span><br><span class="line"></span><br><span class="line">		System.out.println(&quot;\r\n出栈操作--------------------------&quot;);</span><br><span class="line">		while (!stack.isEmpty())</span><br><span class="line">			System.err.print(stack.pop() + &quot;\t&quot;);</span><br></pre></td></tr></table></figure>
