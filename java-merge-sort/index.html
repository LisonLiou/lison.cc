        <figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line">static int[] sort(int[] A, int low, int high) &#123;</span><br><span class="line"></span><br><span class="line">		if (low &lt; high) &#123;</span><br><span class="line">			int mid &#x3D; (low + high) &#x2F; 2;</span><br><span class="line">			sort(A, low, mid);</span><br><span class="line">			sort(A, mid + 1, high);</span><br><span class="line">			merge(A, low, mid, high);</span><br><span class="line">		&#125;</span><br><span class="line"></span><br><span class="line">		return A;</span><br><span class="line">	&#125;</span><br></pre></td></tr></table></figure>

<a id="more"></a>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br></pre></td><td class="code"><pre><span class="line">static void merge(int[] A, int low, int mid, int high) &#123;</span><br><span class="line">	int n1 &#x3D; mid - low + 1, n2 &#x3D; high - mid, i, j, k;</span><br><span class="line">	int[] L &#x3D; new int[high - low + 1], R &#x3D; new int[high - low + 1];</span><br><span class="line"></span><br><span class="line">	for (i &#x3D; 0; i &lt; n1; i++)</span><br><span class="line">		L[i] &#x3D; A[low + i];</span><br><span class="line"></span><br><span class="line">	for (j &#x3D; 0; j &lt; n2; j++)</span><br><span class="line">		R[j] &#x3D; A[mid + j + 1];</span><br><span class="line"></span><br><span class="line">	L[n1] &#x3D; Integer.MAX_VALUE;</span><br><span class="line">	R[n2] &#x3D; Integer.MAX_VALUE;</span><br><span class="line">	i &#x3D; j &#x3D; 0;</span><br><span class="line"></span><br><span class="line">	for (k &#x3D; low; k &lt; high + 1; k++) &#123;</span><br><span class="line">		if (L[i] &lt; R[j]) &#123;</span><br><span class="line">			A[k] &#x3D; L[i];</span><br><span class="line">			i++;</span><br><span class="line">		&#125; else &#123;</span><br><span class="line">			A[k] &#x3D; R[j];</span><br><span class="line">			j++;</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">int[] arr &#x3D; &#123; 8, 3, 6, 4, 2 &#125;;</span><br><span class="line"></span><br><span class="line">		System.out.println(Arrays.toString(arr));</span><br><span class="line">		&#x2F;&#x2F; System.err.println(Arrays.toString(sort(arr, 0, arr.length - 1)));</span><br><span class="line">		&#x2F;&#x2F; System.err.println(Arrays.toString(sort(arr, 0, arr.length - 1)));</span><br><span class="line">		System.err.println(Arrays.toString(s(arr)));</span><br></pre></td></tr></table></figure>

<p>使用分治法分而治之，时间复杂度O(nlogn)，空间复杂度O(n)</p>
