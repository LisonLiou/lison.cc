    <h1 id="post-title">C语言假币问题（分治法）</h1>
    <time id="post-date" datetime="2019-04-13T09:39:58.000Z">
        April 13, 2019
    </time>
    <div id="post-content" class="markdown-body">
        <p>分治法，o(nlogn)</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br></pre></td><td class="code"><pre><span class="line">&#x2F;**</span><br><span class="line">	 * 【假币问题】 有n枚硬币，其中有一枚是假币，已知假币的重量较轻。现只有一个天平，要求用尽量少的比较次数找出这枚硬币。</span><br><span class="line">	 *</span><br><span class="line">	 * 【分析问题】 将n枚硬币分成相等的两部分： 1.当n为偶数时，将前后两部分，即 1...n&#x2F;2</span><br><span class="line">	 * 和n&#x2F;2+1...0，放在天平的两端，较轻的一端里有假币，继续在较轻的这部分硬币中用同样的方法找出假币： 2.当n为奇数时，将前后两部分，即</span><br><span class="line">	 * 1...(n-1)&#x2F;2 和 (n+1)&#x2F;2+1...0，放在天平的两端，较轻的一端里有假币，继续在较轻的这部分硬币中用同样的方法找出假币；</span><br><span class="line">	 * 若两端重量相等，则中间的硬币，即第 (n+1)&#x2F;2 枚硬币是假币。</span><br><span class="line">	 *</span><br><span class="line">	 * 【调用方式】 int cs[] &#x3D; &#123;2, 2, 2, 2, 2, 2, 2, 2, 2, 2, 1, 2,&#125;</span><br><span class="line">	 * getCounterfeitCoint(cs, cs[0], cs[cs.length-1])</span><br><span class="line">	 *</span><br><span class="line">	 * @param coins</span><br><span class="line">	 * @param first</span><br><span class="line">	 * @param last</span><br><span class="line">	 * @return</span><br><span class="line">	 *&#x2F;</span><br><span class="line">	static int getCounterfeitCoin(int coins[], int first, int last) &#123;</span><br><span class="line"></span><br><span class="line">		int firstSum &#x3D; 0, lastSum &#x3D; 0, i;</span><br><span class="line"></span><br><span class="line">		if (first &#x3D;&#x3D; last - 1) &#123; &#x2F;&#x2F; 只剩两枚</span><br><span class="line">			if (coins[first] &lt; coins[last])</span><br><span class="line">				return first;</span><br><span class="line"></span><br><span class="line">			return last;</span><br><span class="line">		&#125;</span><br><span class="line"></span><br><span class="line">		if ((last - first + 1) % 2 &#x3D;&#x3D; 0) &#123; &#x2F;&#x2F; 偶数枚</span><br><span class="line">			for (i &#x3D; first; i &lt; (first + last) &#x2F; 2; i++)</span><br><span class="line">				firstSum +&#x3D; coins[i];</span><br><span class="line"></span><br><span class="line">			for (i &#x3D; first + (last - first) &#x2F; 2 + 1; i &lt; last + 1; i++)</span><br><span class="line">				lastSum +&#x3D; coins[i];</span><br><span class="line"></span><br><span class="line">			if (firstSum &lt; lastSum)</span><br><span class="line">				return getCounterfeitCoin(coins, first, first + (last - first) &#x2F; 2);</span><br><span class="line">			else</span><br><span class="line">				return getCounterfeitCoin(coins, first + (last - first) &#x2F; 2 + 1, last);</span><br><span class="line"></span><br><span class="line">		&#125; else &#123; &#x2F;&#x2F; 奇数枚</span><br><span class="line"></span><br><span class="line">			for (i &#x3D; first; i &lt; first + (last - first) &#x2F; 2; i++)</span><br><span class="line">				firstSum +&#x3D; coins[i];</span><br><span class="line"></span><br><span class="line">			for (i &#x3D; first + (last - first) &#x2F; 2 + 1; i &lt; last + 1; i++)</span><br><span class="line">				lastSum +&#x3D; coins[i];</span><br><span class="line"></span><br><span class="line">			if (firstSum &lt; lastSum)</span><br><span class="line">				return getCounterfeitCoin(coins, first, first + (last - first) &#x2F; 2 - 1);</span><br><span class="line">			else if (firstSum &gt; lastSum)</span><br><span class="line">				return getCounterfeitCoin(coins, first + (last - first) &#x2F; 2 - 1, last);</span><br><span class="line">			else</span><br><span class="line">				return (first + last) &#x2F; 2;</span><br><span class="line"></span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br></pre></td></tr></table></figure>
