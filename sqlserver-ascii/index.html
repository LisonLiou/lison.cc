        <p>给APP上加个彩蛋，又不想那么明目张胆，用char吧，得生成ASCII码。</p>
<p>鱼饰就有了下面的代码，循环字符串长度并且substring，有点搓，还能用吧。</p>
<a id="more"></a>

<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line">declare @msg varchar(255)</span><br><span class="line">set @msg&#x3D;&#39;Hey man, What is the fuck r u doing ?&#39;</span><br><span class="line"></span><br><span class="line">declare @i int</span><br><span class="line">set @i&#x3D;0</span><br><span class="line"></span><br><span class="line">declare @result varchar(255)</span><br><span class="line">while @i&lt;&#x3D;len(@msg)</span><br><span class="line">begin</span><br><span class="line">	print &#39;,&#39; + str(ASCII(substring(@msg,@i,1)))	</span><br><span class="line">	set @i&#x3D;@i+1</span><br><span class="line">end</span><br></pre></td></tr></table></figure>
