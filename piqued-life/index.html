    <h1 id="post-title">如果在赌气的生活工作，我是不是会输掉一些事，一些时间</h1>
    <time id="post-date" datetime="2014-04-27T07:22:13.000Z">
        April 27, 2014
    </time>
    <div id="post-content" class="markdown-body">
        <a id="more"></a>

<p>热狗说，当兴趣不再是兴趣，或许变成一种谋生的工具，我该怎么看我自己。</p>
<p>一路向前，从来没有回头看过走过的路，脚下的印记也不知是深是浅，这一路，是否踏实，我不清楚。</p>
<p>一直有两种处事心态在挣扎，perfect和得过且过。英雄是不问出处，但是成为英雄的路，没有人会问起。</p>
<p>或许该放下互相攀比的心态，人各有志，人各有名。放下计较，做简单的我，三亩良田，我可以过的不错，过的对得起。</p>
<p>烦乱的思绪太多，何时会有结果，我该做考虑。</p>
